# F1 Fantasy Sync — DISABLED for GitHub Actions
#
# The F1 API (api.formula1.com) blocks all datacenter IPs (Azure/AWS/GitHub)
# via Distil Networks CDN-level IP reputation blocking. No workaround exists.
#
# HOW TO UPDATE INSTEAD:
#   1. Run `run_fantasy_sync.bat` (Windows) or `run_fantasy_sync.sh` (Mac/Linux)
#      from your HOME computer after each race weekend
#   2. The script fetches the data and pushes f1_fantasy.json + f1_teams.json
#      to GitHub automatically
#   3. Your GitHub Pages site will update within ~30 seconds
#
# This workflow is kept as a manual trigger only — it will always fail from
# GitHub Actions but is here for documentation purposes.

name: F1 Fantasy Sync (LOCAL ONLY - see run_fantasy_sync scripts)

on:
  workflow_dispatch:   # manual trigger only — will fail, use local scripts instead

permissions:
  contents: write

jobs:
  fantasy_sync:
    runs-on: ubuntu-latest
    steps:
      - name: ❌ This workflow cannot run from GitHub Actions
        run: |
          echo "The F1 Fantasy API blocks all datacenter IPs (including GitHub Actions)."
          echo "Run run_fantasy_sync.bat (Windows) or run_fantasy_sync.sh (Mac/Linux)"
          echo "from your home computer instead."
          exit 1
