name: Update F1 Fantasy Data
on:
  workflow_dispatch:
    inputs:
      json_data:
        description: 'Paste the JSON generated by the AI here'
        required: true
        type: string

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Overwrite data.json
        run: |
          echo '${{ github.event.inputs.json_data }}' > data.json

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update F1 Fantasy results for latest round"
          file_pattern: 'data.json'
