name: Append Weekly F1 Results
on:
  workflow_dispatch:
    inputs:
      json_data:
        description: 'Paste the Weekly JSON from the AI'
        required: true
        type: string

jobs:
  append-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Merge New Data
        shell: python
        run: |
          import json
          import os

          # Load existing history
          history_file = 'history.json'
          with open(history_file, 'r') as f:
              history = json.load(f)

          # Load new weekly data from input
          new_data_raw = os.environ['NEW_JSON']
          new_data = json.loads(new_data_raw)

          # Append to the races list
          history['races'].append(new_data)

          # Save back to file
          with open(history_file, 'w') as f:
              json.dump(history, f, indent=2)
        env:
          NEW_JSON: ${{ github.event.inputs.json_data }}

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Added results for Round ${{ github.event.inputs.round_num }}"
          file_pattern: 'history.json'
