<script>
// ═══════════════════════════════════════════════════════════════════
// PLAYER CONFIG — static fallback metadata
// (overridden at runtime by f1_teams.json players[] display fields)
// ═══════════════════════════════════════════════════════════════════
const PLAYER_CONFIG = {
    kevcedes: { id:"kevcedes", name:"Kevcedes",     owner:"Kevin Liang",    emoji:"🗿", color:"#f4a100" },
    grahhh:   { id:"grahhh",   name:"GRAHHH racing",owner:"Vivian Nguyen",  emoji:"🐥", color:"#ff4757" },
    leclaren: { id:"leclaren", name:"LeClaren F1",  owner:"Selina Le Khac", emoji:"👽", color:"#3a86ff" },
    juice:    { id:"juice",    name:"RACING JUICE", owner:"Justin Tran",    emoji:"👑", color:"#2ec4b6" },
    thumbi:   { id:"thumbi",  name:"Thumbi",        owner:"Thomas George",  emoji:"🍄", color:"#c77dff" },
};
let PLAYERS = {};
function getPlayer(key) {
    return PLAYERS[key] || PLAYER_CONFIG[key] || { id:key, name:key, owner:"", emoji:"👤", color:"#aaa" };
}

const TEAM_TAG_COLORS = {
    "MER":"#00d2be","FER":"#e8002d","RBR":"#3671c6","MCL":"#ff8000",
    "AST":"#358c75","ALP":"#0093cc","WIL":"#005aff","HAA":"#888888",
    "AUD":"#52e252","RBS":"#6692ff","CAD":"#cc0000",
    "RUS":"#00d2be","ANT":"#00d2be","LEC":"#e8002d","HAM":"#e8002d",
    "VER":"#3671c6","HAD":"#3671c6","NOR":"#ff8000","PIA":"#ff8000",
    "ALO":"#358c75","STR":"#358c75","GAS":"#0093cc","COL":"#0093cc",
    "SAI":"#005aff","ALB":"#005aff","BEA":"#888888","OCO":"#888888",
    "HUL":"#52e252","BOR":"#52e252","LAW":"#6692ff","LIN":"#6692ff",
    "BOT":"#cc0000","PER":"#cc0000",
};
const MEDAL_COLOR = ["#f4a100","#9a9aaa","#cd7f32"];
const MEDAL = ["🥇","🥈","🥉"];

// STATE — single source: f1_teams.json
let F1_TEAMS = null;
let F1_DATA  = null;

// HELPERS
function showBanner(type, msg) {
    const b = document.getElementById("sync-banner");
    b.className = `show ${type}`;
    b.textContent = msg;
    if (type !== "loading") setTimeout(() => b.classList.remove("show"), 3500);
}
function getActiveRounds() {
    if (!F1_TEAMS) return [];
    return (F1_TEAMS.rounds || [])
        .filter(r => r.confirmed || r.teams?.some(t => t.picks?.length > 0))
        .sort((a,b) => a.round - b.round);
}
function getGpName(roundNum) {
    const s = F1_SCHEDULE.find(r => r.round === roundNum);
    return s ? s.gp : ((F1_TEAMS?.rounds||[]).find(r => r.round === roundNum)?.gp || `Round ${roundNum}`);
}

// SYNC
async function syncAll() {
    const btn = document.getElementById("sync-btn");
    btn.textContent = "⏳ Loading…"; btn.disabled = true;
    showBanner("loading", "🔄 Syncing data…");
    try {
        await loadF1Teams();
        showBanner("success", `✅ Synced · ${new Date().toLocaleTimeString()}`);
    } catch(e) {
        showBanner("error", "⚠️ Sync failed — check console");
        console.error("Sync error:", e);
    } finally { btn.textContent = "🔄 Sync"; btn.disabled = false; }
}

async function loadF1Teams() {
    const res = await fetch("./f1_teams.json", { cache:"no-cache" });
    if (!res.ok) throw new Error(`f1_teams.json HTTP ${res.status}`);
    F1_TEAMS = await res.json();

    // Build PLAYERS from f1_teams.players[] merged with static PLAYER_CONFIG
    PLAYERS = {};
    for (const pl of (F1_TEAMS.players || [])) {
        const key  = pl.player_key || pl.id;
        const base = PLAYER_CONFIG[key] || {};
        PLAYERS[key] = {
            id:    key,
            name:  pl.name  || base.name  || key,
            owner: pl.owner || base.owner || "",
            emoji: pl.emoji || base.emoji || "👤",
            color: pl.color || base.color || "#aaa",
        };
    }
    for (const [k,v] of Object.entries(PLAYER_CONFIG)) { if (!PLAYERS[k]) PLAYERS[k]={...v}; }

    // Update header
    const active = getActiveRounds();
    if (active.length) {
        const lr  = active[active.length-1];
        const gp  = getGpName(lr.round);
        const flg = GP_FLAGS[gp] || "🏁";
        document.getElementById("header-subtitle").textContent =
            `2026 Season · R${String(lr.round).padStart(2,"0")} · ${gp} ${flg}${lr.confirmed?"":" · 🔄"}`;
    }

    buildHomeDropdown(); renderStandings();
    buildH2HDropdowns(); renderH2H();
    populateTeamsDropdowns(); renderTeamsPanel();
    populateFantasyRounds(); renderF1PlayersPanel();
}

// HOME STANDINGS + WEEKLY
function buildHomeDropdown() {
    const sel = document.getElementById("standings-round-select");
    sel.innerHTML = `<option value="overall">📊 Overall</option>`;
    const active = getActiveRounds();
    [...active].reverse().forEach(r => {
        const gp = getGpName(r.round), flag = GP_FLAGS[gp]||"🏁";
        const o = document.createElement("option");
        o.value = "r"+r.round;
        o.textContent = `${flag} R${String(r.round).padStart(2,"0")} · ${gp}${r.confirmed?"":" 🔄"}`;
        sel.appendChild(o);
    });
    if (active.length) sel.value = "r"+active[active.length-1].round;
}

function renderStandings() {
    if (!F1_TEAMS) return;
    const val = document.getElementById("standings-round-select").value;
    const isOverall = val === "overall";
    let standings = [];

    if (isOverall) {
        standings = [...(F1_TEAMS.players||[])]
            .map(pl => ({ player_key: pl.player_key||pl.id, points: pl.cur_points||0 }))
            .sort((a,b)=>b.points-a.points)
            .map((s,i,a)=>({...s,pos:i+1,gapAbove:i>0?s.points-a[i-1].points:null,gapP1:s.points-a[0].points}));
    } else {
        const rNum = parseInt(val.replace(/^r/i,""));
        const rd   = (F1_TEAMS.rounds||[]).find(r=>r.round===rNum);
        if (!rd) return;
        const src  = rd.standings?.length ? rd.standings : (rd.teams||[]).filter(t=>t.picks?.length).map(t=>({
            player_key:t.player_key||t.player_id, round_points:t.round_points, cumulative_points:t.cumulative_points
        }));
        standings = src.map(s=>{
            const pts = rd.confirmed ? (s.round_points??0) : (s.cumulative_points??0);
            return { player_key:s.player_key, points:pts };
        }).sort((a,b)=>b.points-a.points)
          .map((s,i,a)=>({...s,pos:i+1,gapAbove:i>0?s.points-a[i-1].points:null,gapP1:s.points-a[0].points}));
    }
    if (!standings.length) return;

    const rNum      = isOverall ? null : parseInt(val.replace(/^r/i,""));
    const roundData = rNum ? (F1_TEAMS.rounds||[]).find(r=>r.round===rNum) : null;
    const isProvis  = roundData ? !roundData.confirmed : false;
    const gpName    = rNum ? getGpName(rNum) : "";
    const roundFlag = gpName ? (GP_FLAGS[gpName]||"🏁") : "";

    document.getElementById("standings-table").innerHTML = standings.map((s,i) => {
        const p  = getPlayer(s.player_key);
        const mc = i<3 ? MEDAL_COLOR[i] : p.color;
        const pts = s.points??0;
        const teamEntry = !isOverall&&roundData ? roundData.teams?.find(t=>(t.player_key||t.player_id)===s.player_key) : null;
        const hasPicks  = teamEntry?.picks?.length>0;

        let picksHtml = "";
        if (hasPicks) {
            const chip = pk => {
                const tc=TEAM_TAG_COLORS[pk.team_tag]||"#9090b8";
                return `<span style="background:${tc}22;color:${tc};font-size:8px;font-weight:bold;padding:1px 5px;border-radius:5px;margin:1px;display:inline-block;">${pk.is_star?"⭐":""}${pk.short_name}</span>`;
            };
            const drs=teamEntry.picks.filter(pk=>pk.type==="driver");
            const cns=teamEntry.picks.filter(pk=>pk.type==="constructor");
            picksHtml=`<div class="team-card-detail">
                <div class="text-[8px] uppercase tracking-widest mb-1.5" style="color:var(--muted)">Drivers</div>
                <div class="mb-2">${drs.map(chip).join("")}</div>
                <div class="text-[8px] uppercase tracking-widest mb-1.5" style="color:var(--muted)">Constructors</div>
                <div class="mb-1">${cns.map(chip).join("")}</div>
                ${teamEntry.team_value?`<div class="text-[8px] mt-2" style="color:var(--muted)">Team value: <span style="color:var(--subtext)">$${teamEntry.team_value}M</span></div>`:""}
            </div>`;
        }
        const ptsColor = isProvis ? "#f4a100" : mc;
        return `<div class="team-card prow" style="animation-delay:${i*0.05}s">
            <div class="px-4 py-3 flex items-center gap-3" ${hasPicks?"onclick=\"toggleTeamCard(this)\" style=\"cursor:pointer;\"":""}>
                <div class="w-7 text-center flex-shrink-0">
                    ${i<3?`<span class="text-xl leading-none">${MEDAL[i]}</span>`:`<span class="fun text-base" style="color:${p.color}">${s.pos}</span>`}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="fun text-[15px] leading-tight truncate" style="color:${p.color}">${p.emoji} ${p.name}</div>
                    <div class="text-[9px] truncate" style="color:var(--subtext)">${p.owner}</div>
                </div>
                <div class="text-right flex-shrink-0">
                    <div class="fun text-base leading-none" style="color:${ptsColor}">${pts}${isProvis?"<span style=\"font-size:8px;margin-left:2px;opacity:.6\">~</span>":""}</div>
                    ${i===0?`<div class="text-[9px] font-bold mt-0.5" style="color:var(--gold)">LEADER</div>`
                           :`<div class="text-[9px] mt-0.5 font-mono"><span style="color:#ff6b35">${s.gapAbove??""}</span><span style="color:#d0cee8"> | </span><span style="color:#ff4757">${s.gapP1}</span></div>`}
                </div>
                ${hasPicks?`<div class="team-card-chevron">▼</div>`:"<div class=\"w-4\"></div>"}
            </div>${picksHtml}</div>`;
    }).join("");

    const top=standings[0], worst=standings[standings.length-1];
    document.getElementById("home-stats").innerHTML=`
        <div class="card p-3 text-center"><div class="text-xl">🏆</div>
            <div class="text-[8px] mt-1 uppercase" style="color:var(--muted)">Leader</div>
            <div class="fun text-sm mt-0.5" style="color:var(--gold)">${getPlayer(top.player_key).name}</div>
            <div class="text-[9px] mt-0.5" style="color:var(--muted)">${top.points} pts</div></div>
        <div class="card p-3 text-center"><div class="text-xl">🔥</div>
            <div class="text-[8px] mt-1 uppercase" style="color:var(--muted)">Best ${isOverall?"Total":"Race"}</div>
            <div class="fun text-sm mt-0.5" style="color:#ff4757">${getPlayer(top.player_key).name}</div>
            <div class="text-[9px] mt-0.5" style="color:var(--muted)">${top.points} pts</div></div>
        <div class="card p-3 text-center"><div class="text-xl">💀</div>
            <div class="text-[8px] mt-1 uppercase" style="color:var(--muted)">Worst ${isOverall?"Total":"Race"}</div>
            <div class="fun text-sm mt-0.5" style="color:#c77dff">${getPlayer(worst.player_key).name}</div>
            <div class="text-[9px] mt-0.5" style="color:var(--muted)">${worst.points} pts</div></div>`;

    renderHomeWeeklySection(rNum, roundData, gpName, roundFlag, isProvis);
}

function toggleTeamCard(header) { header.closest(".team-card").classList.toggle("open"); }

function renderHomeWeeklySection(rNum, roundData, gpName, roundFlag, isProvis) {
    const section=document.getElementById("home-weekly-section");
    const title=document.getElementById("home-weekly-title");
    const table=document.getElementById("home-weekly-table");
    if (!rNum||!roundData) { section.style.display="none"; return; }

    const prov=isProvis?" <span style=\"font-size:9px;background:rgba(244,161,0,.15);color:#f4a100;padding:1px 5px;border-radius:4px;vertical-align:middle;\">PROVISIONAL</span>":"";
    section.style.display="";
    title.innerHTML=`${roundFlag} ${gpName} — Team Points${prov}`;

    const teams=(roundData.teams||[]).filter(t=>t.picks?.length).map(t=>({
        ...t, _pts: roundData.confirmed?(t.round_points??0):(t.cumulative_points??0)
    })).sort((a,b)=>(b._pts??-9999)-(a._pts??-9999));

    if (!teams.length) {
        table.innerHTML=`<div class="p-4 text-center text-[10px]" style="color:var(--muted)">${isProvis?"Provisional picks loaded.":"No picks data."}</div>`;
        return;
    }
    const banner=isProvis?`<div style="background:rgba(244,161,0,.08);border-bottom:1px solid rgba(244,161,0,.2);padding:7px 14px;font-size:9px;color:#f4a100;">⚠️ Live race week — points updating</div>`:"";
    table.innerHTML=banner+teams.map((t,i)=>{
        const p=getPlayer(t.player_key||t.player_id);
        const mc=i<3?MEDAL_COLOR[i]:p.color;
        const pts=t._pts??"—";
        const chips=type=>(t.picks||[]).filter(pk=>pk.type===type).map(pk=>{
            const tc=TEAM_TAG_COLORS[pk.team_tag]||"#9090b8";
            return `<span style="background:${tc}22;color:${tc};font-size:8px;font-weight:bold;padding:1px 5px;border-radius:4px;">${pk.is_star?"⭐":""}${pk.short_name}</span>`;
        }).join(" ");
        return `<div class="prow px-4 py-3" style="border-left:3px solid ${mc};animation-delay:${i*0.05}s">
            <div class="flex items-center gap-3 mb-1.5">
                <div class="w-6 text-center flex-shrink-0">${i<3?`<span class="text-lg">${MEDAL[i]}</span>`:`<span class="fun text-sm" style="color:${p.color}">${i+1}</span>`}</div>
                <div class="flex-1 min-w-0"><div class="fun text-[14px] leading-tight" style="color:${p.color}">${p.emoji} ${p.name}</div></div>
                <div class="fun text-lg" style="color:${isProvis?"#f4a100":mc}">${pts}${isProvis&&pts!=="—"?"<span style=\"font-size:9px;opacity:.6\">~</span>":""}</div>
            </div>
            <div class="ml-9 flex flex-wrap gap-0.5">${chips("driver")} ${chips("constructor")}</div>
        </div>`;
    }).join("");
}

// H2H
function buildH2HDropdowns() {
    ["h2h-left","h2h-right"].forEach((id,i)=>{
        const sel=document.getElementById(id);
        sel.innerHTML=Object.values(PLAYERS).map((p,idx)=>
            `<option value="${p.id}" ${i===1&&idx===1?"selected":""}>${p.emoji} ${p.name}</option>`
        ).join("");
    });
    const hSel=document.getElementById("h2h-round-select");
    hSel.innerHTML=`<option value="overall">📊 Overall Season</option>`;
    const active=getActiveRounds();
    [...active].reverse().forEach(r=>{
        const gp=getGpName(r.round);
        const o=document.createElement("option");
        o.value=r.round;
        o.textContent=`${GP_FLAGS[gp]||"🏁"} R${String(r.round).padStart(2,"0")} · ${gp}${r.confirmed?"":" 🔄"}`;
        hSel.appendChild(o);
    });
    if (active.length) hSel.value=active[active.length-1].round;
}

function renderH2H() {
    if (!F1_TEAMS) return;
    const lk=document.getElementById("h2h-left").value;
    const rk=document.getElementById("h2h-right").value;
    const rv=document.getElementById("h2h-round-select").value;
    const isOverall=rv==="overall";
    const L=getPlayer(lk), R=getPlayer(rk);
    const el=document.getElementById("h2h-content");
    if (!L||!R) return;

    const getPoints=(key,roundVal)=>{
        if (roundVal==="overall") {
            const pl=(F1_TEAMS.players||[]).find(p=>(p.player_key||p.id)===key);
            return pl?.cur_points??0;
        }
        const rNum=parseInt(roundVal);
        const rd=(F1_TEAMS.rounds||[]).find(r=>r.round===rNum);
        if (!rd) return 0;
        const s=rd.standings?.find(s=>s.player_key===key);
        if (s) return rd.confirmed?(s.round_points??0):(s.cumulative_points??0);
        const t=rd.teams?.find(t=>(t.player_key||t.player_id)===key);
        return rd.confirmed?(t?.round_points??0):(t?.cumulative_points??0);
    };

    const active=getActiveRounds();
    const Lpts=getPoints(lk,rv), Rpts=getPoints(rk,rv);
    let lWins=0,rWins=0;
    active.filter(r=>r.confirmed).forEach(r=>{
        const lp=getPoints(lk,r.round),rp=getPoints(rk,r.round);
        if(lp>rp) lWins++; else if(rp>lp) rWins++;
    });
    const ties=active.filter(r=>r.confirmed).length-lWins-rWins;
    const gap=Math.abs(Lpts-Rpts), tied=Lpts===Rpts, ahead=Lpts>=Rpts?L:R;

    const getLoverall=key=>{const pl=(F1_TEAMS.players||[]).find(p=>(p.player_key||p.id)===key);return pl?.cur_points??0;};
    const getPos=key=>{
        const s=[...(F1_TEAMS.players||[])].sort((a,b)=>(b.cur_points||0)-(a.cur_points||0));
        return s.findIndex(p=>(p.player_key||p.id)===key)+1;
    };
    const roundLabel=isOverall?"Overall":getGpName(parseInt(rv));
    document.getElementById("h2h-chip").textContent=roundLabel;

    const row=(label,lv,rv2,fL,fR)=>{
        const lW=lv>rv2,rW=rv2>lv;
        return `<div class="flex items-center gap-2 py-2.5 border-b last:border-0" style="border-color:var(--border)">
            <div class="flex-1 text-right font-mono text-xs ${lW?"font-bold":""}" style="${lW?`color:${L.color}`:"color:var(--muted)"}">${fL?fL(lv):lv}</div>
            <div class="w-28 text-center text-[8px] uppercase tracking-widest flex-shrink-0" style="color:var(--muted)">${label}</div>
            <div class="flex-1 text-left font-mono text-xs ${rW?"font-bold":""}" style="${rW?`color:${R.color}`:"color:var(--muted)"}">${fR?fR(rv2):rv2}</div>
        </div>`;
    };

    const posL=getPos(lk),posR=getPos(rk);
    el.innerHTML=`
    <div class="grid grid-cols-2 gap-3 mb-4">
        <div class="card p-3" style="border-left:3px solid ${L.color}"><div class="fun text-[15px] leading-tight" style="color:${L.color}">${L.emoji} ${L.name}</div><div class="text-[9px] mt-0.5" style="color:var(--subtext)">${L.owner}</div></div>
        <div class="card p-3" style="border-left:3px solid ${R.color}"><div class="fun text-[15px] leading-tight" style="color:${R.color}">${R.emoji} ${R.name}</div><div class="text-[9px] mt-0.5" style="color:var(--subtext)">${R.owner}</div></div>
    </div>
    <div class="card px-4 py-1 mb-4">
        ${row("Position",-posL,-posR,v=>`P${Math.abs(v)}`,v=>`P${Math.abs(v)}`)}
        ${row(isOverall?"Total Pts":"Round Pts",Lpts,Rpts)}
        ${isOverall?row("Overall",getLoverall(lk),getLoverall(rk)):""}
        ${row("Round Wins",lWins,rWins)}
        ${row("Ties",ties,ties)}
    </div>
    <div class="card p-4 text-center rb-border">
        <div class="text-[9px] uppercase tracking-widest mb-1" style="color:var(--subtext)">${isOverall?"Overall Gap":"Round Gap"}</div>
        <div class="fun text-4xl leading-none" style="color:${tied?"#f4a100":ahead.color}">${tied?"TIED":gap+" pts"}</div>
        <div class="text-[10px] mt-2" style="color:var(--subtext)">${tied?"Dead level — both on "+Lpts+" pts":ahead.name+" leads by "+gap+" points"}</div>
    </div>`;
}

// DATA PAGE — F1 Players (replaces f1_fantasy.json)
let fantasyMode="drivers";
let fantasySort={ col:"total_points", dir:-1 };

function setFantasyTab(mode) {
    fantasyMode=mode;
    ["drivers","constructors"].forEach(t=>{
        const btn=document.getElementById(`fantasy-tab-${t}`);
        if(!btn) return;
        btn.style.background=t===mode?"#ffffff":""; btn.style.color=t===mode?"var(--text)":"var(--muted)";
    });
    renderF1PlayersPanel();
}
function sortFantasyCol(col) {
    fantasySort={ col, dir: fantasySort.col===col?-fantasySort.dir:-1 };
    renderF1PlayersPanel();
}
function populateFantasyRounds() {
    if (!F1_TEAMS) return;
    const sel=document.getElementById("fantasy-round-select");
    if (!sel) return;
    const active=getActiveRounds();
    sel.innerHTML=`<option value="overall">📊 Overall (Season)</option>`+
        [...active].reverse().map(r=>{
            const gp=getGpName(r.round),flag=GP_FLAGS[gp]||"🏁";
            return `<option value="r${r.round}">${flag} R${String(r.round).padStart(2,"0")} · ${gp}${r.confirmed?"":" [PROVISIONAL]"}</option>`;
        }).join("");
}
function renderF1PlayersPanel() {
    if (!F1_TEAMS) return;
    const gwVal=document.getElementById("fantasy-round-select")?.value||"overall";
    let drivers=[],constructors=[],isProvis=false,roundLabel="";

    if (gwVal==="overall") {
        drivers=F1_TEAMS.f1_players?.drivers||[];
        constructors=F1_TEAMS.f1_players?.constructors||[];
        document.getElementById("fantasy-updated-chip").textContent=F1_TEAMS.last_updated?.split(" ")[0]||"";
        roundLabel="Overall (Season)";
    } else {
        const rNum=parseInt(gwVal.replace(/^r/i,""));
        const rd=(F1_TEAMS.rounds||[]).find(r=>r.round===rNum);
        isProvis=rd?!rd.confirmed:false;
        roundLabel=getGpName(rNum);
        document.getElementById("fantasy-updated-chip").textContent=`R${String(rNum).padStart(2,"0")} · ${roundLabel}${isProvis?" 🔄":""}`;
        drivers=(F1_TEAMS.f1_players?.drivers||[]).map(d=>({...d}));
        constructors=(F1_TEAMS.f1_players?.constructors||[]).map(d=>({...d}));
    }

    const raw=fantasyMode==="drivers"?drivers:constructors;
    const sorted=[...raw].sort((a,b)=>{
        const av=a[fantasySort.col]??-Infinity, bv=b[fantasySort.col]??-Infinity;
        return fantasySort.dir*(bv-av);
    });
    const isRoundView=gwVal!=="overall";
    const ptsField=isRoundView?"points_this_gw":"total_points";

    const th=(col,label,extra="")=>{
        const active=fantasySort.col===col;
        const arrow=active?(fantasySort.dir===-1?"↓":"↑"):"↕";
        return `<th class="p-2 text-center cursor-pointer select-none text-[8px] uppercase tracking-wider font-normal whitespace-nowrap ${extra}" style="color:${active?"#3a86ff":"var(--muted)"}" onclick="sortFantasyCol(\"${col}\")">${label}<span style="opacity:.7;margin-left:2px">${arrow}</span></th>`;
    };
    const rows=sorted.map((d,i)=>{
        const tag=d.short_name||"—";
        const tc=TEAM_TAG_COLORS[d.team_tag||tag]||"#9090b8";
        const pts=isProvis?"—":(d[ptsField]??"—");
        const ptsNum=typeof pts==="number"?pts:0;
        const rankCol=i===0?"#f4a100":i===1?"#9a9aaa":i===2?"#cd7f32":"var(--muted)";
        return `<tr class="border-b last:border-0 transition-colors" style="border-color:var(--border)" onmouseover="this.style.background=\"var(--card2)\"" onmouseout="this.style.background=\"\"">
            <td class="p-2 text-center font-mono text-[9px] font-bold w-6" style="color:${rankCol}">${i+1}</td>
            <td class="p-3"><div class="flex items-center gap-2"><span style="background:${tc}22;color:${tc};font-size:9px;font-weight:bold;padding:2px 6px;border-radius:6px;">${tag}</span><span class="text-[10px]" style="color:var(--text)">${d.full_name||""}</span></div>${fantasyMode==="drivers"&&d.team?`<div class="text-[8px] mt-0.5 ml-9" style="color:${tc}">${d.team}</div>`:""}</td>
            <td class="p-2 text-center font-mono text-[10px]" style="color:var(--subtext)">$${d.price}M</td>
            <td class="p-2 text-center font-mono text-[11px] font-bold" style="color:${ptsNum>0?"#2ec4b6":ptsNum<0?"#ff4757":"var(--subtext)"}">${pts}</td>
        </tr>`;
    }).join("");
    const provBanner=isProvis?`<div style="background:rgba(244,161,0,.1);border:1px solid rgba(244,161,0,.3);border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:9px;color:#f4a100;">⚠️ <strong>${roundLabel}</strong> — PROVISIONAL</div>`:"";
    const label=fantasyMode==="drivers"?"Driver":"Constructor";
    document.getElementById("fantasy-table").innerHTML=rows.length?`${provBanner}<div style="overflow-x:auto"><table class="w-full" style="min-width:280px"><thead><tr class="border-b" style="background:var(--card2);border-color:var(--border)"><th class="p-2 text-center text-[8px] font-normal w-6" style="color:var(--muted)">#</th>${th("full_name",label,"text-left pl-3")}${th("price","Price")}${th(ptsField,isRoundView?"Rnd Pts":"Pts")}</tr></thead><tbody>${rows}</tbody></table></div>`:`<div class="p-6 text-center text-[10px]" style="color:var(--muted)">No data — run sync to populate.</div>`;
}
function renderFantasyTable() { renderF1PlayersPanel(); }
function refreshFantasyRoundsIfNeeded() { if(F1_TEAMS){populateFantasyRounds();renderF1PlayersPanel();} }

// DATA PAGE — League Teams
function populateTeamsDropdowns() {
    if (!F1_TEAMS) return;
    const rSel=document.getElementById("teams-round-select");
    const active=getActiveRounds();
    rSel.innerHTML=`<option value="overall">📊 Overall Standings</option>`+
        [...active].reverse().map(r=>{
            const gp=getGpName(r.round),flag=GP_FLAGS[gp]||"🏁";
            return `<option value="${r.round}">${r.confirmed?"✅":"🔄"} R${String(r.round).padStart(2,"0")} · ${flag} ${gp}${r.confirmed?"":" [PROVISIONAL]"}</option>`;
        }).join("");
    if (active.length) rSel.value=active[active.length-1].round;

    const pSel=document.getElementById("teams-player-select");
    pSel.innerHTML=(F1_TEAMS.players||[]).map(p=>{
        const pl=getPlayer(p.player_key||p.id);
        return `<option value="${p.player_key||p.id}">${pl.emoji} ${pl.name}</option>`;
    }).join("");
}
function renderTeamsPanel() {
    if (!F1_TEAMS) return;
    const val=document.getElementById("teams-round-select")?.value;
    document.getElementById("teams-player-wrap").style.display=val==="overall"?"none":"";
    val==="overall"?renderTeamsOverall():renderTeamsRound(parseInt(val));
}
function renderTeamsOverall() {
    const players=[...(F1_TEAMS.players||[])].sort((a,b)=>(b.cur_points||0)-(a.cur_points||0));
    document.getElementById("teams-updated-chip").textContent=F1_TEAMS.last_updated?.split(" ")[0]||"";
    document.getElementById("teams-summary").innerHTML="";
    document.getElementById("teams-picks-table").innerHTML=`
    <div style="padding:10px 14px 8px;border-bottom:1px solid var(--border)">
        <span class="text-[8px] uppercase tracking-widest" style="color:var(--muted)">Overall League Standings</span>
    </div>
    <table class="w-full"><thead><tr class="border-b" style="background:var(--card2);border-color:var(--border)">
        <th class="p-3 text-left text-[8px] uppercase tracking-wider font-normal" style="color:var(--muted)">Team</th>
        <th class="p-2 text-center text-[8px] uppercase tracking-wider font-normal" style="color:var(--muted)">Rank</th>
        <th class="p-2 text-center text-[8px] uppercase tracking-wider font-normal" style="color:var(--muted)">Points</th>
    </tr></thead><tbody>
    ${players.map((pl,i)=>{
        const p=getPlayer(pl.player_key||pl.id), mc=i<3?MEDAL_COLOR[i]:p.color;
        return `<tr class="border-b last:border-0 transition-colors" style="border-color:var(--border)" onmouseover="this.style.background=\"var(--card2)\"" onmouseout="this.style.background=\"\"">
            <td class="p-3"><div class="fun text-[14px]" style="color:${p.color}">${p.emoji} ${p.name}</div><div class="text-[9px]" style="color:var(--muted)">Rank #${pl.cur_rank||i+1}</div></td>
            <td class="p-2 text-center">${i<3?`<span class="text-lg">${MEDAL[i]}</span>`:`<span class="fun text-sm" style="color:${mc}">${i+1}</span>`}</td>
            <td class="p-2 text-center font-mono text-lg font-bold" style="color:${mc}">${pl.cur_points||0}</td>
        </tr>`;
    }).join("")}</tbody></table>`;
}
function renderTeamsRound(roundNum) {
    const rd=(F1_TEAMS.rounds||[]).find(r=>r.round===roundNum);
    if (!rd) return;
    const playerKey=document.getElementById("teams-player-select")?.value;
    if (!playerKey) return;
    const te=(rd.teams||[]).find(t=>(t.player_key||t.player_id)===playerKey);
    const isProvis=!rd.confirmed;
    const gpName=getGpName(roundNum);
    document.getElementById("teams-updated-chip").textContent=isProvis?"Provisional 🔄":"Confirmed ✅";

    if (!te?.picks?.length) {
        document.getElementById("teams-summary").innerHTML="";
        document.getElementById("teams-picks-table").innerHTML=`<div class="p-4 text-center text-[10px]" style="color:var(--muted)">No team data for this round.</div>`;
        return;
    }
    const rPts=rd.confirmed?(te.round_points??"—"):"—";
    const cPts=te.cumulative_points??"—";
    const budget=te.budget_remaining!=null?`$${te.budget_remaining}M`:"—";
    const teamVal=te.team_value!=null?`$${te.team_value}M`:"—";
    const provBanner=isProvis?`<div style="background:rgba(244,161,0,.1);border:1px solid rgba(244,161,0,.3);border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:9px;color:#f4a100;display:flex;align-items:center;gap:6px;">⚠️ <strong>R${String(roundNum).padStart(2,"0")} · ${gpName}</strong> — PROVISIONAL</div>`:"";
    document.getElementById("teams-summary").innerHTML=`${provBanner}
        <div class="card p-3 text-center"><div class="text-[8px] uppercase tracking-wide mb-1" style="color:var(--muted)">${rd.confirmed?"Round Pts":"Cumul Pts"}</div><div class="fun text-lg" style="color:#2ec4b6">${rd.confirmed?rPts:cPts}</div></div>
        <div class="card p-3 text-center"><div class="text-[8px] uppercase tracking-wide mb-1" style="color:var(--muted)">Team Value</div><div class="fun text-sm" style="color:#3a86ff">${teamVal}</div></div>
        <div class="card p-3 text-center"><div class="text-[8px] uppercase tracking-wide mb-1" style="color:var(--muted)">In Bank</div><div class="fun text-sm" style="color:#f4a100">${budget}</div></div>`;
    const rows=(te.picks||[]).map(pk=>{
        const tc=TEAM_TAG_COLORS[pk.team_tag]||"#9090b8";
        const pts=pk.round_points??"—";
        const ptsNum=typeof pts==="number"?pts:0;
        return `<tr class="border-b last:border-0 transition-colors" style="border-color:var(--border)" onmouseover="this.style.background=\"var(--card2)\"" onmouseout="this.style.background=\"\"">
            <td class="p-3"><div class="flex items-center gap-2">${pk.is_star?"<span style=\"font-size:10px\">⭐</span>":"<span style=\"width:14px;display:inline-block\"></span>"}<span style="background:${tc}22;color:${tc};font-size:9px;font-weight:bold;padding:2px 6px;border-radius:6px;">${pk.short_name}</span><span class="text-[9px]" style="color:var(--subtext)">${pk.type==="constructor"?"🏗️":"🧑‍✈️"}</span></div>${pk.team?`<div class="text-[8px] mt-0.5 ml-9" style="color:${tc}">${pk.team}</div>`:""}</td>
            <td class="p-2 text-center font-mono text-[10px]" style="color:var(--subtext)">$${pk.price}M</td>
            <td class="p-2 text-center font-mono text-[11px] font-bold" style="color:${ptsNum>0?"#2ec4b6":ptsNum<0?"#ff4757":"var(--subtext)"}">${pts}</td>
        </tr>`;
    }).join("");
    document.getElementById("teams-picks-table").innerHTML=`
    <div style="padding:10px 14px 8px;border-bottom:1px solid var(--border)"><span class="text-[8px] uppercase tracking-widest" style="color:var(--muted)">Picks · ${isProvis?`<span style="color:#f4a100">PROVISIONAL</span>`:"Final Points"}</span></div>
    <table class="w-full"><thead><tr class="border-b" style="background:var(--card2);border-color:var(--border)">
        <th class="p-3 text-left text-[8px] uppercase tracking-wider font-normal" style="color:var(--muted)">Pick</th>
        <th class="p-2 text-center text-[8px] uppercase tracking-wider font-normal" style="color:var(--muted)">Price</th>
        <th class="p-2 text-center text-[8px] uppercase tracking-wider font-normal" style="color:var(--muted)">Pts</th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

function onDataStatChange() {
    const v=document.getElementById("data-stat-select").value;
    document.getElementById("data-budget-panel").style.display  = v==="budget" ?"":"none";
    document.getElementById("data-fantasy-panel").style.display = v==="fantasy"?"":"none";
    document.getElementById("data-teams-panel").style.display   = v==="teams"  ?"":"none";
    if (v==="fantasy"){populateFantasyRounds();renderF1PlayersPanel();}
    if (v==="teams"&&F1_TEAMS) renderTeamsPanel();
    if (v==="budget"&&!F1_DATA) loadF1Data();
}

function sydneyOffsetHours(utcDate) {
    const y=utcDate.getUTCFullYear();
    const apr1=new Date(Date.UTC(y,3,1));
    const aprSun=new Date(Date.UTC(y,3,1+(7-apr1.getUTCDay())%7,2,0,0));
    const oct1=new Date(Date.UTC(y,9,1));
    const octSun=new Date(Date.UTC(y,9,1+(7-oct1.getUTCDay())%7,16,0,0));
    if(utcDate>=aprSun&&utcDate<octSun) return 10;
    return 11;
}
function utcToSydney(d){return new Date(d.getTime()+sydneyOffsetHours(d)*3600000);}
function buildSessions(race){return race.sessions.map(s=>{const utcDate=new Date(Date.UTC(s.y,s.mo,s.d,s.h,s.m,0));return{key:s.key,label:s.label,utcDate,sydDate:utcToSydney(utcDate)};});}
function fmtSyd(d){const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];let h=d.getUTCHours(),m=d.getUTCMinutes();const ampm=h>=12?'PM':'AM';h=h%12||12;return`${days[d.getUTCDay()]} ${d.getUTCDate()} ${months[d.getUTCMonth()]}, ${h}:${String(m).padStart(2,'0')} ${ampm}`;}
function fmtCountdown(ms){if(ms<=0)return'00:00:00';const s=Math.floor(ms/1000);const dd=Math.floor(s/86400);const hh=Math.floor((s%86400)/3600);const mm=Math.floor((s%3600)/60);const ss=s%60;if(dd>0)return`${dd}d ${String(hh).padStart(2,'0')}h ${String(mm).padStart(2,'0')}m`;return`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}

let _schedCountdownInterval=null;
function populateScheduleDropdown(){
    const sel=document.getElementById('sched-round-select');if(!sel)return;
    const nowUtc=new Date();let defaultRound=F1_SCHEDULE[0].round;
    for(const r of F1_SCHEDULE){const sessions=buildSessions(r);const last=sessions[sessions.length-1];if(last.utcDate>=nowUtc){defaultRound=r.round;break;}}
    sel.innerHTML=F1_SCHEDULE.map(r=>`<option value="${r.round}" ${r.round===defaultRound?'selected':''}>${GP_FLAGS[r.gp]||'🏁'} R${String(r.round).padStart(2,'0')} · ${r.gp} · ${r.date}</option>`).join('');
    renderScheduleRound();startCountdown();
}
function startCountdown(){if(_schedCountdownInterval)clearInterval(_schedCountdownInterval);_schedCountdownInterval=setInterval(updateCountdown,1000);updateCountdown();}
function updateCountdown(){
    const nowUtc=new Date();let nextSession=null,nextRace=null;
    outer:for(const r of F1_SCHEDULE){for(const s of buildSessions(r)){if(s.utcDate>nowUtc){nextSession=s;nextRace=r;break outer;}}}
    const evEl=document.getElementById('sched-countdown-event'),tmEl=document.getElementById('sched-countdown-timer'),whEl=document.getElementById('sched-countdown-when');
    if(!nextSession){if(evEl)evEl.textContent='Season Complete 🏁';if(tmEl)tmEl.textContent='—';return;}
    const flag=GP_FLAGS[nextRace.gp]||'🏁';
    if(evEl)evEl.textContent=`${flag} ${nextRace.gp} · ${nextSession.label}`;
    if(tmEl)tmEl.textContent=fmtCountdown(nextSession.utcDate-nowUtc);
    if(whEl)whEl.textContent=fmtSyd(nextSession.sydDate);
}
function renderScheduleRound(){
    const roundNum=parseInt(document.getElementById('sched-round-select').value);
    const race=F1_SCHEDULE.find(r=>r.round===roundNum);if(!race)return;
    const sessions=buildSessions(race);const nowUtc=new Date();const flag=GP_FLAGS[race.gp]||'🏁';
    let nextIdx=sessions.findIndex(s=>s.utcDate>nowUtc);
    const rows=sessions.map((s,i)=>{
        const isPast=s.utcDate<=nowUtc,isNext=i===nextIdx;
        let statusBg,statusColor,statusTag;
        if(isPast){statusBg='rgba(255,71,87,.10)';statusColor='#ff4757';statusTag='FINISHED';}
        else if(isNext){statusBg='rgba(46,196,182,.15)';statusColor='#2ec4b6';statusTag='UPCOMING NEXT ▶';}
        else{statusBg='rgba(46,196,182,.06)';statusColor='#74d9d0';statusTag='UPCOMING';}
        const rowBg=isNext?'rgba(46,196,182,.04)':isPast?'rgba(255,71,87,.03)':'';
        return`<tr style="border-bottom:1px solid var(--border);background:${rowBg}"><td class="p-3"><div class="font-bold text-[11px]" style="color:var(--text)">${s.label}</div><div class="text-[9px] mt-0.5" style="color:var(--muted)">${fmtSyd(s.sydDate)} AEDT/AEST</div></td><td class="p-3 text-right" style="vertical-align:middle;"><span style="background:${statusBg};color:${statusColor};font-size:7px;font-weight:bold;padding:2px 6px;border-radius:5px;letter-spacing:.05em;white-space:nowrap;">${statusTag}</span></td></tr>`;
    }).join('');
    document.getElementById('sched-session-table').innerHTML=`<div style="padding:12px 14px 8px;border-bottom:1px solid var(--border);"><div class="fun text-base" style="color:var(--text)">${flag} ${race.gp}</div><div class="text-[9px] mt-0.5" style="color:var(--subtext)">${race.circuit} · ${race.full_dates} · ${race.type==='sprint'?'⚡ Sprint Weekend':'🏁 Traditional Weekend'}</div></div><table class="w-full"><tbody>${rows}</tbody></table>`;
}

function navigate(page) {
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    document.getElementById('nav-'+page).classList.add('active');
    if(page==='data'&&!F1_DATA) loadF1Data();
    window.scrollTo(0,0);
}
